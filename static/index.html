<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>家計簿</title>
  <style>
    :root {
      --bg: #F7F5F2;
      --surface: #FFFFFF;
      --border: #E0DCD6;
      --accent: #3D6B52;
      --accent-light: #EBF3EE;
      --text: #1A1A1A;
      --text-sub: #6B6560;
      --danger: #C0392B;
      --danger-light: #FDECEA;
      --success: #2E7D52;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }
    
    /* 🌐 サーバー起動待ち用の全画面ローディング */
    #startup-loader {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s ease;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loader-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      text-align: center;
      line-height: 1.6;
    }
    .loader-sub {
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 8px;
    }

    header {
      background: var(--accent);
      color: white;
      padding: 18px 20px 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.04em; }
    header p  { font-size: 12px; opacity: 0.75; margin-top: 2px; }
    .container { max-width: 480px; margin: 0 auto; padding: 16px; }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-sub);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 6px;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      color: var(--text);
      background: var(--bg);
      appearance: none;
      -webkit-appearance: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: white;
    }
    textarea { resize: none; height: 64px; }
    .amount-wrap { position: relative; }
    .amount-wrap input { padding-left: 14px; }
    
    .date-wrap { display: flex; gap: 8px; }
    .date-wrap input { flex: 1; }
    .btn-today {
      padding: 0 14px;
      background: var(--accent-light);
      color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-scan-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 12px;
      background: var(--accent-light);
      color: var(--accent);
      border: 1.5px dashed var(--accent);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    #receiptFile { display: none; }
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.15s, transform 0.1s;
      margin-bottom: 16px;
    }
    .btn-submit:active { opacity: 0.85; transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    #confirmSection { display: none; }
    #confirmSection.show { display: block; }

    .confirm-card {
      background: var(--surface);
      border: 1.5px solid var(--accent);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      position: relative;
    }
    .confirm-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .confirm-card-num {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-light);
      padding: 2px 10px;
      border-radius: 100px;
    }
    .btn-remove-entry {
      background: var(--danger-light);
      color: var(--danger);
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .confirm-field { margin-bottom: 10px; }
    .confirm-field:last-child { margin-bottom: 0; }
    .confirm-field label {
      font-size: 11px;
      margin-bottom: 4px;
    }
    .confirm-field input,
    .confirm-field select,
    .confirm-field textarea {
      padding: 9px 12px;
      font-size: 15px;
    }
    .confirm-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .btn-cancel {
      flex: 1;
      padding: 14px;
      background: white;
      color: var(--text-sub);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-confirm-submit {
      flex: 2;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .confirm-total {
      text-align: right;
      font-size: 13px;
      color: var(--text-sub);
      margin-bottom: 12px;
    }
    .confirm-total span {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .history-empty {
      text-align: center;
      color: var(--text-sub);
      font-size: 14px;
      padding: 20px 0;
    }
    .history-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .history-item:last-child { border-bottom: none; }
    .history-left { flex: 1; min-width: 0; }
    .history-date { font-size: 11px; color: var(--text-sub); margin-bottom: 3px; }
    .history-main { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-tags { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 100px;
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 600;
    }
    .history-amount { font-size: 16px; font-weight: 700; color: var(--text); white-space: nowrap; flex-shrink: 0; }
    .history-memo { font-size: 12px; color: var(--text-sub); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-reload {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 8px;
    }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: white;
      padding: 12px 22px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--success); }
    #toast.error   { background: var(--danger); }
  </style>
</head>
<body>

<div id="startup-loader">
  <div class="spinner"></div>
  <div class="loader-text">サーバーを起動しています…<br>（初回は50秒ほどかかる場合があります）</div>
  <div class="loader-sub">接続が完了すると自動的に画面が切り替わります。</div>
</div>

<header>
  <h1>家計簿</h1>
  <p>支出を記録する</p>
</header>

<div class="container">

  <div class="card" id="scanCard">
    <div class="card-title">📷 レシートから自動入力</div>
    <label class="btn-scan-label" id="scanBtnLabel">
      <span id="scanBtnText">📄 レシート画像を選択する</span>
      <input type="file" id="receiptFile" accept="image/*" onchange="scanReceipt(this)" />
    </label>
  </div>

  <div id="confirmSection">
    <div class="card" style="border: 1.5px solid var(--accent); padding-bottom: 4px;">
      <div class="card-title">✏️ 内容を確認・編集してください</div>
      <div id="confirmCards"></div>
    </div>
    <div class="confirm-total">合計 <span id="confirmTotal">¥0</span></div>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="cancelConfirm()">キャンセル</button>
      <button class="btn-confirm-submit" id="confirmSubmitBtn" onclick="submitBulk()">この内容で記録する</button>
    </div>
  </div>

  <div id="manualSection">
    <div class="card">
      <div class="card-title">基本情報</div>
      <div class="field">
        <label>日付</label>
        <div class="date-wrap">
          <input type="date" id="date" />
          <button class="btn-today" onclick="setToday()">今日</button>
        </div>
      </div>
      <div class="field">
        <label>カテゴリ</label>
        <select id="category">
          <option value="">選択してください</option>
          <option value="🍳内食費">🍳内食費</option>
          <option value="🍜外食費">🍜外食費</option>
          <option value="🧻日用品">🧻日用品</option>
          <option value="🎸趣味・娯楽">🎸趣味・娯楽</option>
          <option value="🚙自動車">🚙自動車</option>
          <option value="💍交際費">💍交際費</option>
          <option value="🚃交通費">🚃交通費</option>
          <option value="👕衣服・美容">👕衣服・美容</option>
          <option value="😲特別費">😲特別費</option>
          <option value="🪑家具・家電">🪑家具・家電</option>
          <option value="🛬旅行">🛬旅行</option>
        </select>
      </div>
      <div class="field">
        <label>費目</label>
        <select id="expense_type">
          <option value="">選択してください</option>
          <option value="２毎月・変動費">２毎月・変動費</option>
          <option value="４不定・変動費">４不定・変動費</option>
        </select>
      </div>
      <div class="field">
        <label>金額</label>
        <div class="amount-wrap">
          <input type="number" id="amount" placeholder="0" inputmode="numeric" />
        </div>
      </div>
      <div class="field" style="margin-bottom:0">
        <label>メモ</label>
        <textarea id="memo" placeholder="任意（店名・詳細など）"></textarea>
      </div>
    </div>
    <button class="btn-submit" id="submitBtn" onclick="submitSingle()">記録する</button>
  </div>

  <div class="card">
    <div class="history-header">
      <div class="card-title" style="margin-bottom:0">最近の記録</div>
      <button class="btn-reload" onclick="fetchHistory()">↻ 更新</button>
    </div>
    <div id="historyList">
      <div class="history-empty">読み込み中…</div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
  const CATEGORIES = [
    "🍳内食費","🍜外食費","🧻日用品","🎸趣味・娯楽","🚙自動車",
    "💍交際費","🚃交通費","👕衣服・美容","😲特別費","🪑家具・家電","🛬旅行"
  ];
  const EXPENSE_TYPES = ["２毎月・変動費","４不定・変動費"];

  const CATEGORY_MAP = {
    "内食": "🍳内食費", "🍳内食費": "🍳内食費",
    "外食": "🍜外食費", "🍜外食費": "🍜外食費",
    "食費": "🍳内食費",
    "日用品": "🧻日用品", "🧻日用品": "🧻日用品",
    "娯楽": "🎸趣味・娯楽", "趣味": "🎸趣味・娯楽", "🎸趣味・娯楽": "🎸趣味・娯楽",
    "自動車": "🚙自動車", "🚙自動車": "🚙自動車",
    "交通": "🚃交通費", "🚃交通費": "🚃交通費",
    "交際": "💍交際費", "💍交際費": "💍交際費",
    "衣服": "👕衣服・美容", "美容": "👕衣服・美容", "👕衣服・美容": "👕衣服・美容",
    "特別": "😲特別費", "😲特別費": "😲特別費",
    "家具": "🪑家具・家電", "家電": "🪑家具・家電", "🪑家具・家電": "🪑家具・家電",
    "旅行": "🛬旅行", "🛬旅行": "🛬旅行",
  };
  
  const EXPENSE_MAP = {
    "固定費": "２毎月・変動費", "変動費": "２毎月・変動費", "２毎月・変動費": "２毎月・変動費",
    "特別支出": "４不定・変動費", "貯蓄": "４不定・変動費", "４不定・変動費": "４不定・変動費",
  };

  function matchCategory(raw) {
    if (!raw) return "";
    if (CATEGORIES.includes(raw)) return raw;
    for (const [key, val] of Object.entries(CATEGORY_MAP)) {
      if (raw.includes(key)) return val;
    }
    return "";
  }

  function matchExpenseType(raw) {
    if (!raw) return "";
    if (EXPENSE_TYPES.includes(raw)) return raw;
    for (const [key, val] of Object.entries(EXPENSE_MAP)) {
      if (raw.includes(key)) return val;
    }
    return "";
  }

  function setToday() {
    const t = new Date();
    document.getElementById('date').value =
      `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  }
  setToday();

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => { t.className = ''; }, 2800);
  }

  async function scanReceipt(input) {
    if (!input.files || !input.files[0]) return;
    const file = input.files[0];
    const label = document.getElementById('scanBtnLabel');
    const btnText = document.getElementById('scanBtnText');
    label.style.pointerEvents = 'none';
    btnText.textContent = '⏳ 解析中…';

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch('/scan', { method: 'POST', body: formData });
      if (!res.ok) throw new Error('スキャン失敗');
      const data = await res.json();
      showConfirm(data.entries);
    } catch {
      showToast('レシートの読み込みに失敗しました', 'error');
    } finally {
      label.style.pointerEvents = 'auto';
      btnText.textContent = '📄 レシート画像を選択する';
      input.value = '';
    }
  }

  function showConfirm(entries) {
    const container = document.getElementById('confirmCards');
    container.innerHTML = '';

    entries.forEach((e, i) => {
      const cat = matchCategory(e.category);
      const exp = matchExpenseType(e.expense_type);

      const catOptions = CATEGORIES.map(c =>
        `<option value="${c}" ${c === cat ? 'selected' : ''}>${c}</option>`
      ).join('');
      const expOptions = EXPENSE_TYPES.map(t =>
        `<option value="${t}" ${t === exp ? 'selected' : ''}>${t}</option>`
      ).join('');

      let cleanAmount = 0;
      if (e.amount !== undefined && e.amount !== null) {
        if (typeof e.amount === 'string') {
          cleanAmount = parseInt(e.amount.replace(/[^0-9]/g, '')) || 0;
        } else {
          cleanAmount = parseInt(e.amount) || 0;
        }
      }

      container.innerHTML += `
        <div class="confirm-card" id="entry-${i}">
          <div class="confirm-card-header">
            <span class="confirm-card-num">${i + 1}件目</span>
            <button class="btn-remove-entry" onclick="removeEntry(${i})">削除</button>
          </div>
          <div class="confirm-field">
            <label>日付</label>
            <input type="date" id="e-date-${i}" value="${e.date || ''}" />
          </div>
          <div class="confirm-field">
            <label>カテゴリ</label>
            <select id="e-cat-${i}" onchange="updateTotal()">${catOptions}</select>
          </div>
          <div class="confirm-field">
            <label>費目</label>
            <select id="e-exp-${i}">${expOptions}</select>
          </div>
          <div class="confirm-field">
            <label>金額</label>
            <div class="amount-wrap">
              <input type="number" id="e-amt-${i}" value="${cleanAmount}"
                inputmode="numeric" onchange="updateTotal()" oninput="updateTotal()" />
            </div>
          </div>
          <div class="confirm-field" style="margin-bottom:0">
            <label>メモ</label>
            <textarea id="e-memo-${i}">${e.memo || ''}</textarea>
          </div>
        </div>
      `;
    });

    document.getElementById('confirmCards').dataset.count = entries.length;
    document.getElementById('confirmSection').className = 'show';
    document.getElementById('manualSection').style.display = 'none';
    updateTotal();
    document.getElementById('confirmSection').scrollIntoView({ behavior: 'smooth' });
  }

  function removeEntry(i) {
    const card = document.getElementById(`entry-${i}`);
    if (card) card.remove();
    updateTotal();
    if (document.querySelectorAll('.confirm-card').length === 0) cancelConfirm();
  }

  function updateTotal() {
    let total = 0;
    document.querySelectorAll('.confirm-card').forEach(card => {
      const id = card.id.replace('entry-', '');
      const amtInput = document.getElementById(`e-amt-${id}`);
      if (amtInput) {
        const amt = parseInt(amtInput.value.toString().replace(/[^0-9]/g, '')) || 0;
        total += amt;
      }
    });
    document.getElementById('confirmTotal').textContent = '¥' + total.toLocaleString();
  }

  function cancelConfirm() {
    document.getElementById('confirmSection').className = '';
    document.getElementById('manualSection').style.display = 'block';
  }

  async function submitBulk() {
    const cards = document.querySelectorAll('.confirm-card');
    if (cards.length === 0) return;

    const entries = [];
    for (const card of cards) {
      const id = card.id.replace('entry-', '');
      const rawAmt = document.getElementById(`e-amt-${id}`).value;
      const cleanAmt = parseInt(rawAmt.toString().replace(/[^0-9]/g, '')) || 0;

      entries.push({
        date:         document.getElementById(`e-date-${id}`).value,
        category:     document.getElementById(`e-cat-${id}`).value,
        expense_type: document.getElementById(`e-exp-${id}`).value,
        amount:       cleanAmt,
        memo:         document.getElementById(`e-memo-${id}`).value,
      });
    }

    const btn = document.getElementById('confirmSubmitBtn');
    btn.disabled = true;
    btn.textContent = '送信中…';

    try {
      const res = await fetch('/add_bulk', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ entries }),
      });
      const data = await res.json();
      if (res.ok) {
        showToast(`✓ ${data.message}`, 'success');
        cancelConfirm();
        fetchHistory();
      } else {
        showToast('エラー: ' + (data.detail || '不明なエラー'), 'error');
      }
    } catch {
      showToast('通信エラーが発生しました', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'この内容で記録する';
    }
  }

  async function submitSingle() {
    const date         = document.getElementById('date').value;
    const category     = document.getElementById('category').value;
    const expense_type = document.getElementById('expense_type').value;
    const amount       = document.getElementById('amount').value;
    const memo         = document.getElementById('memo').value;

    if (!date || !category || !expense_type || !amount) {
      showToast('日付・カテゴリ・費目・金額は必須です', 'error');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '送信中…';

    const cleanAmt = parseInt(amount.toString().replace(/[^0-9]/g, '')) || 0;

    try {
      const res = await fetch('/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date, category, expense_type, amount: cleanAmt, memo }),
      });
      const data = await res.json();
      if (res.ok) {
        showToast('✓ 記録しました', 'success');
        document.getElementById('category').value = '';
        document.getElementById('expense_type').value = '';
        document.getElementById('amount').value = '';
        document.getElementById('memo').value = '';
        fetchHistory();
      } else {
        showToast('エラー: ' + (data.detail || '不明なエラー'), 'error');
      }
    } catch {
      showToast('通信エラーが発生しました', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '記録する';
    }
  }

  // 🔄 Render起動監視ロジック
  async function checkServerStatus() {
    const loader = document.getElementById('startup-loader');
    while (true) {
      try {
        const res = await fetch('/history');
        if (res.ok) {
          const data = await res.json();
          renderHistory(data.rows);
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 400);
          break;
        }
      } catch (e) {
        console.log("サーバーの起動を待っています...");
      }
      await new Promise(resolve => setTimeout(resolve, 3000));
    }
  }

  function renderHistory(rows) {
    const list = document.getElementById('historyList');
    if (!rows || rows.length === 0) {
      list.innerHTML = '<div class="history-empty">まだ記録がありません</div>';
      return;
    }
    list.innerHTML = rows.map(r => {
      const cleanAmount = parseInt(r.amount.toString().replace(/[^0-9]/g, '')) || 0;
      return `
        <div class="history-item">
          <div class="history-left">
            <div class="history-date">${r.date}</div>
            <div class="history-main">${r.category}</div>
            <div class="history-tags"><span class="tag">${r.expense_type}</span></div>
            ${r.memo ? `<div class="history-memo">${r.memo}</div>` : ''}
          </div>
          <div class="history-amount">¥${cleanAmount.toLocaleString()}</div>
        </div>
      `;
    }).join('');
  }

  async function fetchHistory() {
    try {
      const res = await fetch('/history');
      const data = await res.json();
      renderHistory(data.rows);
    } catch {
      document.getElementById('historyList').innerHTML = '<div class="history-empty">履歴の取得に失敗しました</div>';
    }
  }

  // 初回起動時のチェック開始
  checkServerStatus();
</script>
</body>
</html>
